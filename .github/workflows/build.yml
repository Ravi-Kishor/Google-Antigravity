name: Build Antigravity from AUR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman
        run: |
          pacman -Syu --noconfirm

          pacman -S --noconfirm \
            base-devel \
            git \
            sudo

      - name: Create build user
        run: |
          useradd -m builder

          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install paru
        run: |
          sudo -u builder bash -c '
            cd /home/builder &&
            git clone https://aur.archlinux.org/paru.git &&
            cd paru &&
            makepkg -si --noconfirm
          '

      - name: Build antigravity package
        run: |
          sudo -u builder bash -c '
            paru -S --noconfirm --skipreview antigravity
          '

      - name: Collect built package
        run: |
          mkdir -p output

          find /home/builder/.cache/paru/clone \
            -name "*.pkg.tar.zst" \
            -exec cp {} output/ \;

          ls -lh output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Antigravity Nightly Build
          files: output/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-arch-package
          path: output/*.pkg.tar.zst
