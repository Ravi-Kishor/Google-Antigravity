name: Build Antigravity Arch Package

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://us-central1-apt.pkg.dev
      DIST: antigravity-debian

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            curl \
            jq \
            bsdtar \
            tar \
            zstd \
            fakeroot

      - name: Install Arch tools
        run: |
          sudo apt install -y pacman-package-manager

      - name: Fetch latest .deb
        run: |
          mkdir work
          cd work

          curl -LO \
            "$BASE_URL/dists/$DIST/main/binary-amd64/Packages"

          PKG_PATH=$(grep "^Filename:" Packages | head -n1 | awk '{print $2}')

          echo "PKG_PATH=$PKG_PATH" >> $GITHUB_ENV

          curl -LO "$BASE_URL/$PKG_PATH"

      - name: Extract deb
        run: |
          cd work

          DEB_FILE=$(basename "$PKG_PATH")

          mkdir extract
          bsdtar -xf "$DEB_FILE" -C extract

          mkdir rootfs
          tar -xf extract/data.tar.* -C rootfs

      - name: Generate PKGBUILD
        run: |
          cd work

          VERSION=$(grep "^Version:" Packages | head -n1 | awk '{print $2}')

          cat > PKGBUILD <<EOF
          pkgname=google-antigravity
          pkgver=${VERSION//-/_}
          pkgrel=1
          pkgdesc="Google Antigravity"
          arch=('x86_64')
          license=('custom')
          depends=()
          
          package() {
              cp -r rootfs/* "\$pkgdir/"
          }
          EOF

      - name: Build Arch package
        run: |
          cd work
          makepkg --nodeps --force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-antigravity-arch
          path: work/*.pkg.tar.zst
