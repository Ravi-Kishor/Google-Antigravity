name: Build Antigravity from AUR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman
        run: |
          pacman -Syu --noconfirm

          pacman -S --noconfirm \
            base-devel \
            git \
            sudo

      - name: Create build user
        run: |
          useradd -m builder

          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Install paru
        run: |
          sudo -u builder bash -c '
            cd /home/builder &&
            git clone https://aur.archlinux.org/paru.git &&
            cd paru &&
            makepkg -si --noconfirm
          '

      - name: Build antigravity package
        run: |
          sudo -u builder bash -c '
            paru -S --noconfirm --skipreview antigravity
          '

      - name: Find built package
        run: |
          find /home/builder/.cache/paru/clone -name "*.pkg.tar.zst"

      - name: Copy package
        run: |
          mkdir output

          find /home/builder/.cache/paru/clone \
            -name "*.pkg.tar.zst" \
            -exec cp {} output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-arch-package
          path: output/*.pkg.tar.zst
