name: Build Antigravity Arch Package

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            curl \
            gnupg \
            ca-certificates \
            tar \
            zstd \
            fakeroot \
            libarchive-tools \
            pacman-package-manager

      - name: Add Antigravity repository
        run: |
          sudo mkdir -p /etc/apt/keyrings

          curl -fsSL \
            https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg \
            | sudo gpg --dearmor --yes \
              -o /etc/apt/keyrings/antigravity-repo-key.gpg

          echo "deb [signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg] \
          https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/ \
          antigravity-debian main" \
          | sudo tee /etc/apt/sources.list.d/antigravity.list > /dev/null

          sudo apt update

      - name: Download Antigravity package
        run: |
          mkdir -p work
          cd work

          apt download antigravity

      - name: Extract .deb package
        run: |
          cd work

          DEB_FILE=$(find . -name "*.deb" | head -n1)

          echo "Using package: $DEB_FILE"

          mkdir -p deb-extract
          mkdir -p rootfs

          bsdtar -xf "$DEB_FILE" -C deb-extract

          tar -xf deb-extract/data.tar.* -C rootfs

      - name: Generate PKGBUILD
        run: |
          cd work

          VERSION=$(dpkg-deb -f *.deb Version)

          cat > PKGBUILD <<EOF
          pkgname=google-antigravity
          pkgver=${VERSION//-/_}
          pkgrel=1
          pkgdesc="Google Antigravity repackaged for Arch Linux"
          arch=('x86_64')
          url="https://us-central1-apt.pkg.dev"
          license=('custom')

          package() {
              cp -a "\$srcdir/rootfs/." "\$pkgdir/"
          }
          EOF

      - name: Build Arch package
        run: |
          cd work
          makepkg --nodeps --force --noextract

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-antigravity-arch
          path: work/*.pkg.tar.zst
