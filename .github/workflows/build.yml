name: Build Antigravity Arch Package

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            curl \
            gnupg \
            ca-certificates \
            tar \
            zstd \
            fakeroot \
            libarchive-tools

      - name: Add Google Antigravity repository
        run: |
          sudo mkdir -p /etc/apt/keyrings

          curl -fsSL \
            https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg \
            | sudo gpg --dearmor --yes \
              -o /etc/apt/keyrings/antigravity-repo-key.gpg

          echo "deb [signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg] \
          https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/ \
          antigravity-debian main" \
          | sudo tee /etc/apt/sources.list.d/antigravity.list > /dev/null

          sudo apt update

      - name: Install Antigravity package
        run: |
          sudo apt install -y antigravity

      - name: Extract installed package
        run: |
          mkdir work

          dpkg -L antigravity > work/filelist.txt

          mkdir -p work/rootfs

          cd /

          sudo tar \
            --exclude=proc \
            --exclude=sys \
            --exclude=dev \
            -cf - \
            $(dpkg -L antigravity | grep '^/') \
          | tar -xf - -C "$GITHUB_WORKSPACE/work/rootfs"

      - name: Create PKGBUILD
        run: |
          VERSION=$(dpkg-query -W -f='${Version}' antigravity)

          cat > work/PKGBUILD <<EOF
          pkgname=google-antigravity
          pkgver=${VERSION//-/_}
          pkgrel=1
          pkgdesc="Google Antigravity repackaged for Arch Linux"
          arch=('x86_64')
          license=('custom')

          package() {
              cp -a rootfs/* "\$pkgdir/"
          }
          EOF

      - name: Build Arch package
        run: |
          cd work
          makepkg --nodeps --force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: google-antigravity-arch
          path: work/*.pkg.tar.zst
