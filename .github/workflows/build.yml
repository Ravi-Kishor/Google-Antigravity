name: Build Antigravity Arch Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            make \
            fakeroot \
            zstd \
            curl \
            gnupg \
            ca-certificates \
            libarchive-tools \
            pacman-package-manager

      - name: Verify files
        run: |
          ls -la

          test -f PKGBUILD || (echo "PKGBUILD missing" && exit 1)

      - name: Build package
        run: |
          makepkg -sf --noconfirm

      - name: List built packages
        run: |
          ls -lh *.pkg.tar.zst

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-arch-package
          path: "*.pkg.tar.zst"
